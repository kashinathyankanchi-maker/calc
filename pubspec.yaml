name: kashi
description: A GitHub-themed Flutter Calculator with GitHub Profile Stats integration and timber logs CBM calculator.
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.5
  http: ^1.1.0
  math_expressions: ^2.4.0
  google_fonts: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/icon/app_icon.jpg

flutter_launcher_icons:
  android: "kashi"
  ios: false
  image_path: "assets/icon/app_icon.jpg"
